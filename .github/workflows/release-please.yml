name: Release Please

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      - name: Trigger publish workflow
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES='${{ steps.release.outputs.paths_released }}'
          for path in $(echo "$RELEASES" | jq -r '.[]'); do
            case "$path" in
              ".")
                TAG="sqlsaber-v${{ steps.release.outputs['.--version'] }}"
                ;;
              "plugins/viz")
                TAG="sqlsaber-viz-v${{ steps.release.outputs['plugins/viz--version'] }}"
                ;;
              "plugins/notebook")
                TAG="sqlsaber-notebook-v${{ steps.release.outputs['plugins/notebook--version'] }}"
                ;;
              "plugins/sandbox")
                TAG="sqlsaber-sandbox-v${{ steps.release.outputs['plugins/sandbox--version'] }}"
                ;;
            esac
            gh workflow run publish.yml -f tag="$TAG"
          done
